{
  "manifest_version": 3,
  "name": "Privacy Risk Analyzer",
  "version": "1.0",

  "permissions": ["activeTab", "scripting","tabs"],

  "host_permissions": [
    "http://127.0.0.1:5000/*"
  ],

  "content_scripts": [
    {
      "matches": ["<all_urls>"],
      "js": ["content.js"]
    }
  ],

  "action": {
    "default_popup": "popup.html"
  }
}
